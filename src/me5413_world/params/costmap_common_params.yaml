footprint: [[-0.21, -0.165], [-0.21, 0.165], [0.21, 0.165], [0.21, -0.165]]
footprint_padding: 0.01

robot_base_frame: base_link
update_frequency: 4.0
publish_frequency: 3.0
transform_tolerance: 0.5

resolution: 0.05

obstacle_range: 2.5
raytrace_range: 3.0

# Layer definitions
static_layer:
  map_topic: /map
  subscribe_to_updates: true

obstacle_layer:
  observation_sources: laser_scan_sensor point_cloud_sensor
  laser_scan_sensor: {sensor_frame: tim551, data_type: LaserScan, topic: /front/scan, marking: true, clearing: true, min_obstacle_height: 0.25, max_obstacle_height: 3.0}
  point_cloud_sensor: {sensor_frame: velodyne, data_type: PointCloud2, topic: /mid/points, marking: true, clearing: true, min_obstacle_height: 0.25, max_obstacle_height: 3.0}

inflation_layer:
  inflation_radius: 0.4 # More conservative buffer to avoid walls
  cost_scaling_factor: 15.0 # Definitive decay
